<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrandLab Report Tool</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

    <div class="max-w-6xl mx-auto px-4 py-8">
        <!-- Header -->
        <header class="flex justify-between items-center mb-10 border-b border-slate-200 pb-5">
            <div>
                <h1 class="text-3xl font-bold text-slate-900 tracking-tight">BrandLab Report Tool</h1>
                <p class="text-slate-500 mt-1">간편하게 브랜드 분석 보고서를 생성하고 관리하세요.</p>
            </div>
            <div class="flex items-center gap-3">
                <span class="flex h-3 w-3 relative">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                </span>
                <span class="text-sm font-medium text-slate-600">시스템 정상동작 중</span>
            </div>
        </header>

        <!-- Main Content Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Left: Input Form (2 cols wide on large screens) -->
            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-xl font-semibold mb-5 text-slate-900 flex items-center gap-2">
                        <span>📝</span> 분석 정보 입력
                    </h2>
                    
                    <form class="space-y-5">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">브랜드 이름</label>
                            <input type="text" placeholder="예: 브랜드랩 코리아" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition">
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">산업 군</label>
                                <select class="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition">
                                    <option>IT / 테크</option>
                                    <option>패션 / 뷰티</option>
                                    <option>F&B (식음료)</option>
                                    <option>커머스 / 쇼핑</option>
                                    <option>기타</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">보고서 유형</label>
                                <select class="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition">
                                    <option>종합 브랜드 진단</option>
                                    <option>경쟁사 비교 분석</option>
                                    <option>소셜 미디어 동향</option>
                                </select>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">주요 키워드 (쉼표로 구분)</label>
                            <input type="text" placeholder="트렌디, 가성비, 친환경" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">상세 분석 요청 사항</label>
                            <textarea rows="4" placeholder="AI 분석 시 중점적으로 다루었으면 하는 내용을 적어주세요." class="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition resize-none"></textarea>
                        </div>

                        <button type="button" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-4 rounded-xl transition shadow-sm shadow-blue-200 cursor-pointer text-center block">
                            🚀 보고서 생성하기 (AI)
                        </button>
                    </form>
                </div>
            </div>

            <!-- Right: Status & History (1 col wide) -->
            <div class="space-y-6">
                <!-- Quick Settings -->
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-lg font-semibold mb-4 text-slate-900 flex items-center gap-2">
                        <span>⚙️</span> 옵션 설정
                    </h2>
                    <div class="space-y-3">
                        <div class="flex justify-between items-center py-2 border-b border-slate-100">
                            <span class="text-sm text-slate-600">데이터 실시간 크롤링</span>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" checked class="sr-only peer">
                                <div class="w-9 h-5 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-blue-600"></div>
                            </label>
                        </div>
                        <div class="flex justify-between items-center py-2 border-b border-slate-100">
                            <span class="text-sm text-slate-600">감성 분석(Sentiment) 포함</span>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" checked class="sr-only peer">
                                <div class="w-9 h-5 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-blue-600"></div>
                            </label>
                        </div>
                        <div class="flex justify-between items-center py-2">
                            <span class="text-sm text-slate-600">PDF 자동 다운로드</span>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" class="sr-only peer">
                                <div class="w-9 h-5 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-blue-600"></div>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Recent Activity / History -->
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-lg font-semibold mb-4 text-slate-900 flex items-center gap-2">
                        <span>📊</span> 최근 생성된 보고서
                    </h2>
                    <div class="space-y-3">
                        <div class="p-3 bg-slate-50 rounded-xl border border-slate-100 hover:bg-slate-100 transition cursor-pointer">
                            <div class="flex justify-between items-start mb-1">
                                <span class="font-medium text-sm text-slate-800">나이키 코리아 진단</span>
                                <span class="text-[11px] bg-blue-50 text-blue-600 px-2 py-0.5 rounded-full font-medium">완료</span>
                            </div>
                            <span class="text-xs text-slate-400">방금 전 · 패션 / 뷰티</span>
                        </div>
                        
                        <div class="p-3 bg-slate-50 rounded-xl border border-slate-100 hover:bg-slate-100 transition cursor-pointer">
                            <div class="flex justify-between items-start mb-1">
                                <span class="font-medium text-sm text-slate-800">스타벅스 RTD 분석</span>
                                <span class="text-[11px] bg-blue-50 text-blue-600 px-2 py-0.5 rounded-full font-medium">완료</span>
                            </div>
                            <span class="text-xs text-slate-400">2시간 전 · F&B</span>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
